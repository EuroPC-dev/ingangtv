<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV EuroPC Ingang</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/garet" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: #AEC6CF; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      transition: background-color 0.8s ease-in-out;
    }

    /* Zwarte achtergrond wanneer pauzemodus actief is */
    body.pauze-modus,
    body.pauze-modus .kiosk-container {
      background-color: #000000 !important;
    }

    .kiosk-container { 
      container-type: inline-size;
      position: relative; 
      aspect-ratio: 9 / 16; 
      width: 100%; 
      height: 100%; 
      max-height: 100vh; 
      max-width: 100vw; 
      background-color: #AEC6CF; 
      box-sizing: border-box; 
      overflow: hidden; 
      transition: background-color 0.8s ease-in-out;
    }

    /* Logo bovenaan de klok (Aangepast: iets lager geplaatst) */
    #header-logo {
      position: absolute;
      top: 9%;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
    }

    /* Logo grootte (Aangepast: iets groter gemaakt) */
    #header-logo img {
      width: 80%;
      max-width: 550px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(2px 4px 10px rgba(0, 0, 0, 0.25));
    }

    .kiosk-video { 
      position: absolute; 
      left: 5%; 
      width: 90%; 
      height: 30%; 
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      overflow: hidden;
      box-sizing: border-box; 
      opacity: 1;
      visibility: visible;
      transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
    }

    #info-bar { 
      position: absolute; 
      top: 23%; 
      height: 21%; 
      left: 0; 
      width: 100%; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      color: white; 
      text-shadow: 2px 2px 16px rgba(0, 0, 0, 0.5); 
      z-index: 10; 
      box-sizing: border-box; 
    }
    #video-onder { top: 48%; }
    .live-klok { font-family: 'Garet', sans-serif; font-weight: 850; font-size: clamp(55px, 15cqw, 210px); line-height: 0.82; letter-spacing: -2px; }
    .live-datum { 
      font-family: 'Inter', sans-serif; 
      font-size: clamp(20px, 4cqw, 60px); 
      line-height: 1.1; 
      font-weight: 900; 
      margin-top: 15px; 
      text-align: center; 
      padding: 0 10px; 
      opacity: 1;
      transition: opacity 0.4s ease-in-out;
    }
    
    #news-bar { 
      position: absolute; 
      bottom: 6%; 
      left: 5%; 
      width: 90%; 
      height: clamp(40px, 6.5cqw, 90px); 
      background-color: #333333; 
      border-radius: 10px; 
      display: flex; 
      align-items: center; 
      padding: 0 15px; 
      box-sizing: border-box; 
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3); 
      z-index: 10; 
      opacity: 1;
      visibility: visible;
      transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
    }
    
    /* Vervaag-klasse voor elementen die verborgen moeten worden */
    .fade-hidden {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    #news-logo { height: 55%; width: auto; margin-right: 12px; display: block; object-fit: contain; }
    #news-text-container { flex-grow: 1; overflow: hidden; display: flex; align-items: center; justify-content: flex-start; height: 100%; }
    
    #news-ticker { 
      font-family: 'Inter', sans-serif; 
      color: white; 
      font-weight: 700; 
      text-align: left; 
      white-space: normal; 
      display: -webkit-box; 
      -webkit-line-clamp: 2; 
      -webkit-box-orient: vertical; 
      width: 100%; 
      font-size: clamp(11px, 2.1cqw, 22px); 
      line-height: 1.15; 
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
    }

    #news-ticker.fade-out {
      opacity: 0;
    }
  </style>
</head>
<body>

  <div class="kiosk-container" id="kiosk-container">
    <div id="header-logo">
      <img src="logo.png" alt="EuroPC Logo" />
    </div>

    <div id="info-bar">
      <div class="live-klok" id="live-klok">--:--</div>
      <div class="live-datum" id="live-datum">--- -- ---</div>
    </div>

    <iframe 
      id="video-onder" 
      class="kiosk-video" 
      src="https://www.youtube-nocookie.com/embed/videoseries?list=PLEuSxsuyW1fM&autoplay=1&mute=1&loop=1&controls=0&rel=0" 
      allow="autoplay; encrypted-media" 
      allowfullscreen>
    </iframe>

    <div id="news-bar">
      <img id="news-logo" src="nu.png" alt="NU.nl Logo" />
      <div id="news-text-container"><div id="news-ticker">Nieuws wordt geladen...</div></div>
    </div>
  </div>

  <script>
    // --- NIEUWS FEED LOGICA ---
    let nieuwsItems = [];
    let nieuwsIndex = 0;

    async function haalNieuwsOp() {
      try {
        const response = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.nu.nl/rss/Sport");
        const data = await response.json();
        
        if (data.items && data.items.length > 0) {
          nieuwsItems = data.items;
          toonVolgendNieuws();
        } else {
          document.getElementById('news-ticker').textContent = "Geen actueel sportnieuws beschikbaar.";
        }
      } catch (e) {
        document.getElementById('news-ticker').textContent = "Nieuws tijdelijk niet beschikbaar.";
      }
    }

    function toonVolgendNieuws() {
      if (nieuwsItems.length === 0) return;
      const ticker = document.getElementById('news-ticker');
      
      ticker.classList.add('fade-out');

      setTimeout(() => {
        ticker.textContent = nieuwsItems[nieuwsIndex].title;
        ticker.classList.remove('fade-out');
        nieuwsIndex = (nieuwsIndex + 1) % nieuwsItems.length;
      }, 500);
    }

    haalNieuwsOp();
    setInterval(haalNieuwsOp, 10 * 60 * 1000);
    setInterval(toonVolgendNieuws, 7000);

    // --- KLOK, PAUZESTAND EN AFTELLER ---
    let wasPauze = null;

    function updateKlokEnDatum() {
      const nu = new Date();
      const dagVanDeWeek = nu.getDay(); // 0 = Zondag, 1 = Maandag, ..., 6 = Zaterdag
      const uur = nu.getHours();
      const minuut = nu.getMinutes();

      // Controleer of het een werkdag is (maandag t/m vrijdag -> dag 1 t/m 5)
      const isWerkdag = (dagVanDeWeek !== 0 && dagVanDeWeek !== 6);

      // Controleer of de pauze actief is (alleen op werkdagen tussen 12:30 en 13:00)
      const isPauze = isWerkdag && (uur === 12 && minuut >= 30);

      const headerLogo = document.getElementById('header-logo');
      const videoElement = document.getElementById('video-onder');
      const newsBarElement = document.getElementById('news-bar');
      const datumElement = document.getElementById('live-datum');

      if (isPauze) {
        document.body.classList.add('pauze-modus');
        headerLogo.classList.add('fade-hidden');
        videoElement.classList.add('fade-hidden');
        newsBarElement.classList.add('fade-hidden');

        const eindPauze = new Date(nu);
        eindPauze.setHours(13, 0, 0, 0);
        const resterendeMilliSec = eindPauze - nu;

        const resterendeMinuten = Math.floor(resterendeMilliSec / 1000 / 60);
        const resterendeSeconden = Math.floor((resterendeMilliSec / 1000) % 60);

        document.getElementById('live-klok').textContent = 
          `${String(resterendeMinuten).padStart(2, '0')}:${String(resterendeSeconden).padStart(2, '0')}`;
        
        if (wasPauze !== true) {
          datumElement.style.opacity = '0';
          setTimeout(() => {
            datumElement.textContent = "Wij hebben tot 13:00 Lunchpauze.";
            datumElement.style.opacity = '1';
          }, 400);
        }
      } else {
        document.body.classList.remove('pauze-modus');
        headerLogo.classList.remove('fade-hidden');
        videoElement.classList.remove('fade-hidden');
        newsBarElement.classList.remove('fade-hidden');

        document.getElementById('live-klok').textContent = 
          `${String(uur).padStart(2, '0')}:${String(minuut).padStart(2, '0')}`;
        
        const dagen = ['Zondag', 'Maandag', 'Dinsdag', 'Woensdag', 'Donderdag', 'Vrijdag', 'Zaterdag'];
        const maanden = ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december'];
        const normaleDatumTekst = `${dagen[nu.getDay()]} ${nu.getDate()} ${maanden[nu.getMonth()]}`;

        if (wasPauze !== false) {
          datumElement.style.opacity = '0';
          setTimeout(() => {
            datumElement.textContent = normaleDatumTekst;
            datumElement.style.opacity = '1';
          }, 400);
        } else {
          datumElement.textContent = normaleDatumTekst;
        }
      }

      wasPauze = isPauze;
    }

    updateKlokEnDatum();
    setInterval(updateKlokEnDatum, 1000);

    // --- AUTOMATISCHE REFRESH (Elke 3 uur) ---
    setTimeout(() => {
      window.location.reload();
    }, 3 * 60 * 60 * 1000);
  </script>
</body>
</html>
