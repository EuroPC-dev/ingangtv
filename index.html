<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV EuroPC Ingang</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/garet" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: #AEC6CF; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
    }
    .kiosk-container { 
      container-type: inline-size;
      position: relative; 
      aspect-ratio: 9 / 16; 
      width: 100%; 
      height: 100%; 
      max-height: 100vh; 
      max-width: 100vw; 
      background-color: #AEC6CF; 
      box-sizing: border-box; 
      overflow: hidden; 
    }
    .kiosk-video { 
      position: absolute; 
      left: 0; 
      width: 100%; 
      height: 33%; 
      border: none;
      border-top: 4px solid white; 
      border-bottom: 4px solid white; 
      box-sizing: border-box; 
    }

    #info-bar { 
      position: absolute; 
      top: 25%; 
      height: 21%; 
      left: 0; 
      width: 100%; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      color: white; 
      text-shadow: 2px 2px 16px rgba(0, 0, 0, 0.5); 
      z-index: 10; 
      box-sizing: border-box; 
    }
    #video-onder { top: 48%; }
    .live-klok { font-family: 'Garet', sans-serif; font-weight: 850; font-size: clamp(55px, 15cqw, 210px); line-height: 0.82; letter-spacing: -2px; }
    .live-datum { font-family: 'Inter', sans-serif; font-size: clamp(20px, 4cqw, 60px); line-height: 1.1; font-weight: 900; margin-top: 15px; text-align: center; padding: 0 10px; }
    
    #news-bar { 
      position: absolute; 
      bottom: 6%; 
      left: 5%; 
      width: 90%; 
      height: clamp(40px, 6.5cqw, 90px); 
      background-color: #333333; 
      border-radius: 10px; 
      display: flex; 
      align-items: center; 
      padding: 0 15px; 
      box-sizing: border-box; 
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3); 
      z-index: 10; 
    }
    #news-logo { height: 55%; width: auto; margin-right: 12px; display: block; object-fit: contain; }
    #news-text-container { flex-grow: 1; overflow: hidden; display: flex; align-items: center; justify-content: flex-start; height: 100%; }
    
    #news-ticker { 
      font-family: 'Inter', sans-serif; 
      color: white; 
      font-weight: 700; 
      text-align: left; 
      white-space: normal; 
      display: -webkit-box; 
      -webkit-line-clamp: 2; 
      -webkit-box-orient: vertical; 
      width: 100%; 
      font-size: clamp(11px, 2.1cqw, 22px); 
      line-height: 1.15; 
      opacity: 1;
      transition: opacity 0.5s ease-in-out;
    }

    #news-ticker.fade-out {
      opacity: 0;
    }
  </style>
</head>
<body>

  <div class="kiosk-container">
    <div id="info-bar">
      <div class="live-klok" id="live-klok">--:--</div>
      <div class="live-datum" id="live-datum">--- -- ---</div>
    </div>

    <iframe 
      id="video-onder" 
      class="kiosk-video" 
      src="https://www.youtube.com/embed?listType=playlist&list=PLeZLvM17wCjE&autoplay=1&mute=1&loop=1&controls=0&rel=0" 
      allow="autoplay; encrypted-media" 
      allowfullscreen>
    </iframe>

    <div id="news-bar">
      <img id="news-logo" src="nu.png" alt="NU.nl Logo" />
      <div id="news-text-container"><div id="news-ticker">Nieuws wordt geladen...</div></div>
    </div>
  </div>

  <script>
    // --- NIEUWS FEED LOGICA ---
    let nieuwsItems = [];
    let nieuwsIndex = 0;

    async function haalNieuwsOp() {
      try {
        const response = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.nu.nl/rss/Sport");
        const data = await response.json();
        
        if (data.items && data.items.length > 0) {
          nieuwsItems = data.items;
          toonVolgendNieuws();
        } else {
          document.getElementById('news-ticker').textContent = "Geen actueel sportnieuws beschikbaar.";
        }
      } catch (e) {
        document.getElementById('news-ticker').textContent = "Nieuws tijdelijk niet beschikbaar.";
      }
    }

    function toonVolgendNieuws() {
      if (nieuwsItems.length === 0) return;
      const ticker = document.getElementById('news-ticker');
      
      ticker.classList.add('fade-out');

      setTimeout(() => {
        ticker.textContent = nieuwsItems[nieuwsIndex].title;
        ticker.classList.remove('fade-out');
        nieuwsIndex = (nieuwsIndex + 1) % nieuwsItems.length;
      }, 500);
    }

    haalNieuwsOp();
    setInterval(haalNieuwsOp, 10 * 60 * 1000);
    setInterval(toonVolgendNieuws, 7000);

    // --- KLOK, PAUZESTAND EN AFTELLER ---
    function updateKlokEnDatum() {
      const nu = new Date();
      const uur = nu.getHours();
      const minuut = nu.getMinutes();

      // Controleer of de huidige tijd tussen 12:30 en 13:00 valt
      const isPauze = (uur === 13 && minuut >= 30);

      const videoElement = document.getElementById('video-onder');
      const newsBarElement = document.getElementById('news-bar');

      if (isPauze) {
        // --- PAUZESTAND ACTIEF ---
        videoElement.style.display = 'none';
        newsBarElement.style.display = 'none';

        // Bereken resterende tijd tot 13:00:00
        const eindPauze = new Date(nu);
        eindPauze.setHours(14, 0, 0, 0);
        const resterendeMilliSec = eindPauze - nu;

        const resterendeMinuten = Math.floor(resterendeMilliSec / 1000 / 60);
        const resterendeSeconden = Math.floor((resterendeMilliSec / 1000) % 60);

        // Afteller weergeven als MM:SS
        document.getElementById('live-klok').textContent = 
          `${String(resterendeMinuten).padStart(2, '0')}:${String(resterendeSeconden).padStart(2, '0')}`;
        
        document.getElementById('live-datum').textContent = "Wij hebben tot 13:00 Lunchpauze.";
      } else {
        // --- NORMALE STAND ---
        videoElement.style.display = 'block';
        newsBarElement.style.display = 'flex';

        // Normale klokweergave (HH:MM)
        document.getElementById('live-klok').textContent = 
          `${String(uur).padStart(2, '0')}:${String(minuut).padStart(2, '0')}`;
        
        // Normale datumweergave
        const dagen = ['Zondag', 'Maandag', 'Dinsdag', 'Woensdag', 'Donderdag', 'Vrijdag', 'Zaterdag'];
        const maanden = ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december'];
        document.getElementById('live-datum').textContent = 
          `${dagen[nu.getDay()]} ${nu.getDate()} ${maanden[nu.getMonth()]}`;
      }
    }

    updateKlokEnDatum();
    setInterval(updateKlokEnDatum, 1000);

    // --- AUTOMATISCHE REFRESH (Elke 12 uur) ---
    setTimeout(() => {
      window.location.reload();
    }, 12 * 60 * 60 * 1000);
  </script>
</body>
</html>
